<!DOCTYPE html>
<html>
<head>
    <title>Dev Chat</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        input, select, button, textarea {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: none;
        }

        textarea {
            height: 100px;
            resize: vertical;
            font-family: monospace;
            background: #161b22;
            color: #c9d1d9;
        }

        button {
            background: #238636;
            color: white;
            cursor: pointer;
        }

        #chat {
            display: none;
        }

        #messages {
            height: 400px;
            overflow-y: auto;
            background: #161b22;
            padding: 15px;
            border-radius: 10px;
        }

        .msg {
            background: #0d1117;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #30363d;
        }

        .meta {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 5px;
        }

        pre {
            background: #010409;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            color: #58a6ff;
        }

        .copy-btn {
            float: right;
            font-size: 12px;
            background: #21262d;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        .tag {
            font-size: 11px;
            color: #facc15;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- AUTH -->
    <div id="auth">
        <h2>Dev Chat Login</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- CHAT -->
    <div id="chat">
        <h2>💻 Code Sharing Room</h2>

        <div id="messages"></div>

        <input id="title" placeholder="Title (optional)">
        
        <select id="language">
            <option value="bash">Bash</option>
            <option value="javascript">JavaScript</option>
            <option value="sql">SQL</option>
            <option value="python">Python</option>
        </select>

        <textarea id="msg" placeholder="Paste your command/script here..."></textarea>

        <button onclick="send()">Share Code</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket, token, username;

async function register() {
    await fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value
        })
    });
    alert("Registered!");
}

async function login() {
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value
        })
    });

    const data = await res.json();
    token = data.token;
    username = data.username;

    startChat();
}

function startChat() {
    auth.style.display = "none";
    chat.style.display = "block";

    socket = io({ auth: { token } });

    socket.on("chat message", (data) => {
        const div = document.createElement("div");
        div.classList.add("msg");

        const meta = document.createElement("div");
        meta.classList.add("meta");
        meta.innerHTML = `<b>${data.user}</b> • <span class="tag">${data.lang}</span>`;

        const copyBtn = document.createElement("span");
        copyBtn.classList.add("copy-btn");
        copyBtn.innerText = "Copy";
        copyBtn.onclick = () => navigator.clipboard.writeText(data.message);

        const title = document.createElement("div");
        title.innerHTML = `<b>${data.title || ""}</b>`;

        const pre = document.createElement("pre");
        pre.textContent = data.message;

        div.appendChild(meta);
        div.appendChild(copyBtn);
        div.appendChild(title);
        div.appendChild(pre);

        messages.appendChild(div);
    });
}

function send() {
    socket.emit("chat message", {
        title: title.value,
        message: msg.value,
        lang: language.value
    });

    msg.value = "";
    title.value = "";
}

const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const msg = document.getElementById("msg");
const messages = document.getElementById("messages");
const title = document.getElementById("title");
const language = document.getElementById("language");
const auth = document.getElementById("auth");
const chat = document.getElementById("chat");
</script>

</body>
</html>
